<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure User Verification</title>
    <!-- Modern Typography: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Decorative Glowing Blobs -->
    <div class="blob blob-purple"></div>
    <div class="blob blob-blue"></div>

    <main class="container">
        <section class="card glassmorphism">
            <header class="card-header">
                <div class="shield-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                    </svg>
                </div>
                <h1>Identity Verification</h1>
                <p class="subtitle">Please confirm your credentials to verify your account</p>
            </header>

            <form id="verification-form" novalidate>
                <!-- Name Field -->
                <div class="input-group">
                    <label for="name">Full Name</label>
                    <div class="input-wrapper">
                        <input type="text" id="name" name="name" placeholder="John Doe" autocomplete="name" required>
                        <span class="status-indicator"></span>
                    </div>
                    <span class="error-msg" id="name-error"></span>
                </div>

                <!-- Email Field -->
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" name="email" placeholder="john.doe@example.com" autocomplete="email" required>
                        <span class="status-indicator"></span>
                    </div>
                    <span class="error-msg" id="email-error"></span>
                </div>

                <!-- Phone Field -->
                <div class="input-group">
                    <label for="phone">Phone Number</label>
                    <div class="input-wrapper">
                        <input type="tel" id="phone" name="phone" placeholder="10-digit number" maxlength="10" autocomplete="tel" required>
                        <span class="status-indicator"></span>
                    </div>
                    <span class="error-msg" id="phone-error"></span>
                </div>

                <!-- Network/Global Error -->
                <div id="global-error" class="global-error-container hidden">
                    <svg class="error-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="12" y1="8" x2="12" y2="12"></line>
                        <line x1="12" y1="16" x2="12.01" y2="16"></line>
                    </svg>
                    <span id="global-error-text"></span>
                </div>

                <!-- Submit Button -->
                <button type="submit" id="submit-btn" class="submit-btn">
                    <span class="btn-text">Verify Credentials</span>
                    <span class="btn-loader hidden">
                        <svg class="spinner" viewBox="0 0 50 50">
                            <circle class="path" cx="25" cy="25" r="20" fill="none" stroke-width="5"></circle>
                        </svg>
                    </span>
                </button>
            </form>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
